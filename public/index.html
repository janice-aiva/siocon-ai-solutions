<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siocon AI Solutions | Premium Virtual Support & Automation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-warm: #FAF8F5;
            --bg-section: #F3EFE8;
            --text-main: #1F1F1F;
            --text-secondary: #5F5F5F;
            --accent: #C8A97E;
            --border: #E8E1D8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-warm);
            color: var(--text-main);
            scroll-behavior: smooth;
        }

        h1, h2, h3, .serif {
            font-family: 'Playfair Display', serif;
        }

        .btn-primary {
            background-color: var(--text-main);
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 9999px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
            font-weight: 500;
            font-size: 0.875rem;
            letter-spacing: 0.025em;
            cursor: pointer;
            border: none;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -8px rgba(200, 169, 126, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .card {
            background: #FFFFFF;
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid rgba(232, 225, 216, 0.5);
        }

        .input-field {
            width: 100%;
            padding: 1rem;
            background-color: var(--bg-warm);
            border: 1px solid var(--border);
            border-radius: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: var(--accent);
            background-color: white;
            box-shadow: 0 0 0 4px rgba(200, 169, 126, 0.1);
        }

        .loading-spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid #fff;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Nav & Animation Classes from your original code */
        .glass-nav { background: rgba(250, 248, 245, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(232, 225, 216, 0.3); }
        .hero-shape { background: linear-gradient(135deg, rgba(200, 169, 126, 0.1) 0%, rgba(243, 239, 232, 0.4) 100%); border-radius: 60% 40% 70% 30% / 40% 50% 60% 70%; animation: morph 15s ease-in-out infinite; }
        @keyframes morph { 0%, 100% { border-radius: 60% 40% 70% 30% / 40% 50% 60% 70%; } 50% { border-radius: 30% 60% 40% 70% / 50% 40% 30% 60%; } }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed w-full z-50 glass-nav">
        <div class="max-w-7xl mx-auto px-6 lg:px-12">
            <div class="flex justify-between items-center h-24">
                <div class="flex items-center">
                    <span class="serif text-2xl font-semibold tracking-tight text-main">Siocon AI Solutions</span>
                </div>
                <div class="hidden md:flex items-center space-x-10">
                    <a href="#" class="text-sm text-secondary hover:text-main">Home</a>
                    <a href="#services" class="text-sm text-secondary hover:text-main">Services</a>
                    <a href="#about" class="text-sm text-secondary hover:text-main">About</a>
                    <a href="#contact" class="btn-primary py-3 px-8 text-xs uppercase tracking-widest">Get Support</a>
                </div>
            </div>
        </div>
    </nav>

    <section id="contact" class="py-24 lg:py-32 bg-white">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex flex-col lg:flex-row gap-24">
                <div class="lg:w-1/3">
                    <h2 class="text-4xl font-semibold mb-8">Let's Connect</h2>
                    <p class="text-secondary text-lg leading-relaxed mb-12">I'd love to hear more about your business challenges. Use the form or contact me directly via LinkedIn or WhatsApp.</p>
                    
                    <div class="space-y-10">
                        <div class="flex items-start space-x-6">
                            <div class="w-12 h-12 rounded-2xl bg-[#F3EFE8] flex items-center justify-center text-accent">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-width="1.5"/></svg>
                            </div>
                            <div>
                                <p class="text-[10px] uppercase tracking-widest font-bold text-secondary mb-1">Email</p>
                                <a href="mailto:janice@sioconaisolutions.com" class="text-lg font-medium hover:text-accent transition-colors">janice@sioconaisolutions.com</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:w-2/3">
                    <div class="card shadow-sm">
                        <form id="contact-form" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-xs font-bold uppercase tracking-widest text-secondary mb-2">Full Name</label>
                                    <input type="text" name="name" required class="input-field" placeholder="John Doe">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold uppercase tracking-widest text-secondary mb-2">Email Address</label>
                                    <input type="email" name="email" required class="input-field" placeholder="john@example.com">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-bold uppercase tracking-widest text-secondary mb-2">How can I help?</label>
                                <textarea name="message" rows="5" required class="input-field" placeholder="Tell me about your project..."></textarea>
                            </div>

                            <div id="status-message" class="hidden p-4 rounded-xl text-sm font-medium"></div>

                            <button type="submit" id="submit-button" class="btn-primary w-full md:w-auto">
                                <span>Send Inquiry</span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-12 border-t border-border text-center">
        <p class="text-secondary text-sm">© 2026 Siocon AI Solutions. All rights reserved.</p>
    </footer>

    <script>
        const form = document.getElementById('contact-form');
        const status = document.getElementById('status-message');
        const btn = document.getElementById('submit-button');

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            
            // Loading State
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Sending...';
            status.className = "hidden";

            const data = new FormData(event.target);

            try {
                const response = await fetch("https://formspree.io/f/mpqbqrpw", {
                    method: "POST",
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    status.innerHTML = "Success! Your message has been sent. Janice will get back to you shortly.";
                    status.className = "p-4 rounded-xl text-sm font-medium bg-green-50 text-green-700 block";
                    form.reset();
                } else {
                    const result = await response.json();
                    status.innerHTML = result.errors ? result.errors.map(e => e.message).join(", ") : "Oops! Something went wrong.";
                    status.className = "p-4 rounded-xl text-sm font-medium bg-red-50 text-red-700 block";
                }
            } catch (error) {
                status.innerHTML = "Error connecting to the server. Please try again later.";
                status.className = "p-4 rounded-xl text-sm font-medium bg-red-50 text-red-700 block";
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Send Inquiry';
            }
        });
    </script>
</body>
</html>
