<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Sioconai Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
        <div class="mb-6 text-center">
            <h2 class="text-2xl font-bold text-gray-800">Send an Inquiry</h2>
            <p class="text-gray-600">Response will be sent to janice@sioconaisolutions.com</p>
        </div>

        <!-- 
            FORM SUBMISSION LOGIC:
            1. Register at formspree.io
            2. Create a new "Form" and get your "Form ID"
            3. Replace 'mpqbqrpw' in the script below
        -->
        <form id="contactForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" name="name" id="name" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Your Email</label>
                <input type="email" name="email" id="email" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                <textarea name="message" id="message" rows="4" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"></textarea>
            </div>

            <div id="formStatus" class="hidden p-3 rounded-lg text-sm text-center"></div>

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition flex items-center justify-center space-x-2">
                <span>Send Inquiry</span>
            </button>
        </form>
    </div>

    <script>
        const form = document.getElementById('contactForm');
        const statusDiv = document.getElementById('formStatus');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI State: Loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="loading-spinner"></div> <span>Sending...</span>';
            statusDiv.classList.add('hidden');

            const formData = new FormData(form);

            try {
                // Form ID mpqbqrpw has been applied below
                const response = await fetch('https://formspree.io/f/mpqbqrpw', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    statusDiv.textContent = "Thanks! Your inquiry has been sent to Janice.";
                    statusDiv.className = "p-3 rounded-lg text-sm text-center bg-green-100 text-green-700 block";
                    form.reset();
                } else {
                    const data = await response.json();
                    if (Object.hasOwn(data, 'errors')) {
                        statusDiv.textContent = data.errors.map(error => error.message).join(", ");
                    } else {
                        statusDiv.textContent = "Oops! There was a problem submitting your form";
                    }
                    statusDiv.className = "p-3 rounded-lg text-sm text-center bg-red-100 text-red-700 block";
                }
            } catch (error) {
                statusDiv.textContent = "Oops! There was a problem connecting to the server.";
                statusDiv.className = "p-3 rounded-lg text-sm text-center bg-red-100 text-red-700 block";
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Send Inquiry</span>';
            }
        });
    </script>
</body>
</html>
